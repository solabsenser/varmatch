<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarMatch TV — Match</title>
  <style>
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:#060a16; color:#e7ebf3; }
    .container { width:min(1100px,94vw); margin:20px auto; display:grid; gap:12px; }
    .card { background:#121a2b; border:1px solid #33415566; border-radius:16px; padding:14px; }
    .row { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:8px; }
    .stat { padding:10px; border:1px solid #33415588; border-radius:10px; }
    .btn { color:white; text-decoration:none; background:#f43f5e; border-radius:8px; padding:8px 10px; display:inline-block; margin-right:8px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card row">
      <div>
        <h1 id="title">Загрузка...</h1>
        <div id="meta"></div>
      </div>
      <a class="btn" href="/">← К матчам</a>
    </section>

    <section class="card" id="playerWrap"></section>

    <section class="card">
      <h3>Статистика</h3>
      <div class="stats" id="stats"></div>
    </section>
  </div>

  <script>
    const title = document.getElementById('title');
    const meta = document.getElementById('meta');
    const playerWrap = document.getElementById('playerWrap');
    const stats = document.getElementById('stats');

    function renderStats(s) {
      const entries = [
        ['Владение', `${s.possessionHome}% - ${s.possessionAway}%`],
        ['Удары', `${s.shotsHome} - ${s.shotsAway}`],
        ['Угловые', `${s.cornersHome} - ${s.cornersAway}`],
        ['Жёлтые карточки', `${s.yellowCardsHome} - ${s.yellowCardsAway}`]
      ];
      stats.innerHTML = entries.map(([k, v]) => `<div class="stat"><strong>${k}</strong><div>${v}</div></div>`).join('');
    }

    function mountPlayer(streamUrl, statsUrl, searchUrl) {
      playerWrap.innerHTML = `
        <h3>Донор-страницы</h3>
        <p>Открывайте только нужные разделы: трансляцию и статистику. Плеер можно доработать отдельным скриптом в новом окне.</p>
        <a class="btn" href="${streamUrl}" target="_blank" rel="noopener noreferrer">Только трансляция</a>
        <a class="btn" href="${statsUrl}" target="_blank" rel="noopener noreferrer">Только статистика</a>
        <a class="btn" href="${searchUrl}" target="_blank" rel="noopener noreferrer">Результаты поиска</a>
      `;
    }

    async function loadMatch() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;
      const res = await fetch(`/api/matches/${encodeURIComponent(id)}/stream`);
      if (!res.ok) {
        playerWrap.innerHTML = 'Поток недоступен.';
        return;
      }
      const m = await res.json();
      title.textContent = m.title;
      meta.textContent = `${m.competition} • ${m.status} ${m.minute || ''} • Счёт ${m.score.home}:${m.score.away}`;
      renderStats(m.stats);
      mountPlayer(m.stream, m.donorStatsUrl, m.donorSearchUrl);
    }

    loadMatch();
    setInterval(loadMatch, 30000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarMatch TV</title>
  <style>
    :root { --bg:#060a16; --card:#121a2b; --text:#e7ebf3; --muted:#94a3b8; --accent:#f43f5e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .container { width:min(1200px,94vw); margin:20px auto 32px; display:grid; gap:14px; }
    .card { background:var(--card); border:1px solid #33415566; border-radius:16px; padding:14px; }
    .top { display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
    .search { width:min(420px,100%); padding:10px 12px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:#fff; }
    .columns { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); }
    .match { border:1px solid #33415588; border-radius:12px; padding:10px; margin-bottom:8px; }
    .teams { display:flex; justify-content:space-between; align-items:center; gap:8px; font-weight:700; }
    .team { display:flex; align-items:center; gap:8px; }
    .status { color:var(--muted); font-size:.9rem; margin-top:6px; }
    .badge { color:white; background:var(--accent); border-radius:999px; padding:2px 8px; font-size:.75rem; }
    .btn { display:inline-block; margin-top:8px; color:white; text-decoration:none; background:linear-gradient(135deg,var(--accent),#fb7185); border-radius:10px; padding:8px 10px; font-weight:600; }
    .league { display:inline-block; border:1px solid #334155; border-radius:999px; padding:4px 10px; margin:4px 6px 0 0; color:var(--muted); }
    .ad { text-align:center; border:1px dashed #475569; color:var(--muted); border-radius:12px; padding:12px; }
  </style>
</head>
<body>
  <div class="container">
    <section class="card top">
      <div>
        <h1 id="title">VarMatch TV</h1>
        <div id="meta" class="status">Live-центр футбольных матчей</div>
      </div>
      <input id="search" class="search" placeholder="Поиск: команда, турнир, матч" />
    </section>

    <section class="card">
      <h3>Top Leagues</h3>
      <div id="leagues"></div>
    </section>

    <section class="columns">
      <article class="card">
        <h3>Live Matches</h3>
        <div id="live"></div>
      </article>
      <article class="card">
        <h3>Upcoming Matches</h3>
        <div id="upcoming"></div>
      </article>
      <article class="card">
        <h3>Finished Matches</h3>
        <div id="finished"></div>
      </article>
    </section>

    <section class="card ad">[Рекламный баннер] Здесь можно подключить AdSense / партнёрские офферы / pre-roll.</section>
  </div>

  <script>
    const ui = {
      title: document.getElementById('title'),
      meta: document.getElementById('meta'),
      search: document.getElementById('search'),
      live: document.getElementById('live'),
      upcoming: document.getElementById('upcoming'),
      finished: document.getElementById('finished'),
      leagues: document.getElementById('leagues')
    };

    let allMatches = [];

    const fmt = (m) => `${m.homeTeam.name} ${m.score.home}:${m.score.away} ${m.awayTeam.name}`;

    function groupAndRender(matches) {
      const live = matches.filter((m) => m.status === 'LIVE' || m.status === 'HT');
      const upcoming = matches.filter((m) => m.status === 'UPCOMING');
      const finished = matches.filter((m) => m.status === 'FT');

      const render = (node, items) => {
        if (!items.length) {
          node.innerHTML = '<div class="status">Нет матчей</div>';
          return;
        }

        node.innerHTML = items.map((m) => `
          <div class="match">
            <div class="teams">
              <span class="team"><img src="${m.homeTeam.logo}" width="24" height="24"/>${m.homeTeam.name}</span>
              <span>${m.score.home}:${m.score.away}</span>
              <span class="team">${m.awayTeam.name}<img src="${m.awayTeam.logo}" width="24" height="24"/></span>
            </div>
            <div class="status"><span class="badge">${m.status}</span> ${m.minute || ''} • ${m.competition}</div>
            <a class="btn" href="/player.html?id=${encodeURIComponent(m.id)}">Открыть матч</a>
          </div>`).join('');
      };

      render(ui.live, live);
      render(ui.upcoming, upcoming);
      render(ui.finished, finished);

      const leagues = [...new Set(matches.map((m) => m.competition))];
      ui.leagues.innerHTML = leagues.map((l) => `<span class="league">${l}</span>`).join('');
      ui.meta.textContent = `Всего матчей: ${matches.length}`;
    }

    async function fetchMatches() {
      const r = await fetch('/matches');
      const p = await r.json();
      allMatches = p.matches || [];
      groupAndRender(allMatches);
    }

    ui.search.addEventListener('input', async () => {
      const q = ui.search.value.trim();
      if (!q) return groupAndRender(allMatches);
      const r = await fetch(`/search?q=${encodeURIComponent(q)}`);
      const items = await r.json();
      groupAndRender(items);
    });

    if ('Notification' in window) Notification.requestPermission();

    let previousLiveCount = 0;
    async function tick() {
      await fetchMatches();
      const currentLive = allMatches.filter((m) => m.status === 'LIVE').length;
      if (Notification.permission === 'granted' && currentLive > previousLiveCount) {
        new Notification('VarMatch TV', { body: 'Новый матч перешёл в LIVE.' });
      }
      previousLiveCount = currentLive;
    }

    tick();
    setInterval(tick, 60000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarMatch TV</title>
  <style>
    :root {
      --bg: #060a16;
      --card: #121a2b;
      --text: #e7ebf3;
      --muted: #94a3b8;
      --accent: #f43f5e;
      --accent-soft: rgba(244, 63, 94, 0.18);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background:
        radial-gradient(900px 420px at 100% -15%, rgba(244, 63, 94, 0.2), transparent 60%),
        radial-gradient(500px 260px at -10% 0%, rgba(56, 189, 248, 0.16), transparent 70%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container { width: min(1040px, 92vw); margin: 28px auto 34px; display: grid; gap: 18px; }
    .hero, .panel {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 18px;
      backdrop-filter: blur(8px);
    }

    .hero { padding: 18px; display: flex; justify-content: space-between; gap: 14px; align-items: center; flex-wrap: wrap; }
    .title { margin: 0; font-size: clamp(1.4rem, 2.4vw, 2rem); font-weight: 700; }
    .title span { color: var(--accent); }
    .tagline { margin-top: 6px; color: var(--muted); font-size: .95rem; }
    .stats { display: flex; gap: 10px; flex-wrap: wrap; }
    .pill {
      padding: 7px 11px; border-radius: 999px; border: 1px solid rgba(148, 163, 184, 0.26);
      color: #d1d9e6; background: rgba(2, 6, 23, .35); font-size: .82rem;
    }

    .panel { padding: 16px; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .search { width: min(420px, 100%); position: relative; }
    .search input {
      width: 100%; padding: 11px 14px; border: 1px solid rgba(148, 163, 184, .25);
      border-radius: 12px; background: rgba(2, 6, 23, .55); color: var(--text); outline: none;
    }
    .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .btn {
      border: none; cursor: pointer; color: white; background: linear-gradient(135deg, var(--accent), #fb7185);
      font-weight: 600; border-radius: 10px; padding: 10px 14px; transition: transform .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .status { color: var(--muted); margin: 0; font-size: .95rem; }

    .match-list { display: grid; gap: 9px; max-height: 64vh; overflow: auto; padding-right: 2px; }
    .match-card {
      background: var(--card); border: 1px solid rgba(148, 163, 184, .2); border-radius: 12px;
      padding: 10px 12px; display: flex; justify-content: space-between; gap: 10px; align-items: center;
    }
    .match-title { font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
    .empty { color: var(--muted); text-align: center; padding: 20px 10px; }
    a { color: inherit; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div>
        <h1 class="title" id="app-title">VarMatch <span>TV</span></h1>
        <div class="tagline" id="app-tagline">Матчи на сегодня и прямые трансляции</div>
      </div>
      <div class="stats">
        <div class="pill" id="app-version">v2.1</div>
        <div class="pill" id="match-count">Матчей сегодня: 0</div>
      </div>
    </section>

    <section class="panel">
      <div class="controls">
        <div class="search">
          <input id="search-input" placeholder="Поиск матча..." />
        </div>
        <button class="btn" id="refresh-btn">Обновить список</button>
      </div>
      <p class="status" id="status">Загрузка матчей на сегодня...</p>
      <div class="match-list" id="list"></div>
    </section>
  </div>

  <script>
    const ui = {
      list: document.getElementById('list'),
      status: document.getElementById('status'),
      searchInput: document.getElementById('search-input'),
      refreshBtn: document.getElementById('refresh-btn'),
      appTitle: document.getElementById('app-title'),
      appTagline: document.getElementById('app-tagline'),
      appVersion: document.getElementById('app-version'),
      matchCount: document.getElementById('match-count')
    };

    let allMatches = [];
    let refreshInterval = 60000;

    const setStatus = (message) => {
      ui.status.textContent = message;
    };

    const escapeHtml = (text) => text
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        if (!res.ok) throw new Error('config');

        const config = await res.json();
        document.title = config.appTitle || 'VarMatch TV';
        ui.appTitle.innerHTML = `${(config.appTitle || 'VarMatch').replace(' TV', '')} <span>TV</span>`;
        ui.appTagline.textContent = config.appTagline || 'Матчи на сегодня и прямые трансляции';
        ui.appVersion.textContent = config.appVersion || 'v2.1';
        refreshInterval = Number(config.refreshIntervalMs) || refreshInterval;
        if (config.accentColor) {
          document.documentElement.style.setProperty('--accent', config.accentColor);
        }
      } catch (_error) {
        setStatus('Работаем на локальной конфигурации интерфейса.');
      }
    }

    function renderList(items) {
      ui.matchCount.textContent = `Матчей сегодня: ${items.length}`;

      if (!items.length) {
        ui.list.innerHTML = '<div class="empty">Матчи не найдены. Попробуйте обновить позже.</div>';
        return;
      }

      ui.list.innerHTML = items.map((match) => `
        <article class="match-card">
          <div class="match-title">${escapeHtml(match.title.toUpperCase())}</div>
          <a class="btn" href="/player.html?id=${encodeURIComponent(match.id)}">Открыть плеер</a>
        </article>
      `).join('');
    }

    async function loadMatches() {
      try {
        setStatus('Обновляем список матчей на сегодня...');
        const res = await fetch('/api/matches/today');
        const payload = await res.json();
        allMatches = Array.isArray(payload.matches) ? payload.matches : [];

        setStatus(allMatches.length ? 'Доступные матчи на сегодня:' : 'Матчи пока не найдены, дождитесь следующего обновления.');
        renderList(allMatches);
      } catch (_error) {
        setStatus('Ошибка загрузки. Проверьте API /api/matches/today.');
      }
    }

    ui.searchInput.addEventListener('input', () => {
      const query = ui.searchInput.value.trim().toLowerCase();
      if (!query) {
        renderList(allMatches);
        return;
      }

      const filtered = allMatches.filter((item) => item.title.toLowerCase().includes(query));
      renderList(filtered);
    });

    ui.refreshBtn.addEventListener('click', loadMatches);

    (async () => {
      await loadConfig();
      await loadMatches();
      setInterval(loadMatches, refreshInterval);
    })();
  </script>
</body>
</html>
